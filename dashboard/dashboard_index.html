<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Summary Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --danger-color: #f85149;
            --success-color: #3fb950;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.08), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(248, 81, 73, 0.05), transparent 25%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
            background: -webkit-linear-gradient(180deg, var(--accent-color), #c084fc);
            background: linear-gradient(180deg, var(--accent-color), #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-header {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
        }

        .card-value.danger { color: var(--danger-color); }
        .card-value.success { color: var(--success-color); }
        .card-value.accent { color: var(--accent-color); }

        .uploader {
            margin-top: 50px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .upload-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 15px;
        }

        .upload-btn:hover {
            background: #79b8ff;
            transform: scale(1.05);
        }
        
        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--accent-color);
        }

        /* Micro-animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .d-1 { animation-delay: 0.1s; }
        .d-2 { animation-delay: 0.2s; }
        .d-3 { animation-delay: 0.3s; }
        .d-4 { animation-delay: 0.4s; }
        .d-5 { animation-delay: 0.5s; }
        .d-6 { animation-delay: 0.6s; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header fade-in">
        <h1>Customer Summary</h1>
        <p>Real-time analytics for your WhatsApp Automation</p>
    </div>

    <div class="grid" id="dashboard-grid">
        <!-- Filled by JS -->
    </div>

    <div class="uploader fade-in d-6">
        <h3>Store Visuals</h3>
        <p style="color: var(--text-secondary);">Upload shop catalog images or store banners to Supabase.</p>
        <div class="upload-area">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary); margin-bottom: 15px;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <br>
            <span style="color: var(--text-secondary);">Drag & drop or browse</span>
        </div>
        <button class="upload-btn">Upload Image</button>
    </div>
</div>

<script>
    // In a real app, this would be a fetch('./customer_summary.json')
    // For this minimal static demo, we use mock data representative of the Python output.
    const mockData = {
        "total_customers": 50,
        "repeat_customers": 20,
        "new_customers": 10,
        "pending_payments": 5,
        "inactive_customers": 15,
        "repeat_percentage": "40.0%",
        "total_pending_amount": 1250.50
    };

    const grid = document.getElementById('dashboard-grid');

    const metrics = [
        { label: "Total Customers", value: mockData.total_customers, class: "accent", delay: "d-1" },
        { label: "Repeat Customers", value: mockData.repeat_customers, class: "success", delay: "d-2" },
        { label: "New Customers", value: mockData.new_customers, class: "", delay: "d-3" },
        { label: "Inactive Customers", value: mockData.inactive_customers, class: "", delay: "d-4" },
        { label: "Pending Payments", value: mockData.pending_payments, class: "danger", delay: "d-5" },
        { label: "Total Pending Amount", value: `$${mockData.total_pending_amount.toFixed(2)}`, class: "danger", delay: "d-6" }
    ];

    metrics.forEach(metric => {
        const card = document.createElement('div');
        card.className = `card fade-in ${metric.delay}`;
        card.innerHTML = `
            <div class="card-header">${metric.label}</div>
            <div class="card-value ${metric.class}">${metric.value}</div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
